announcements:
  kill:
    default:
      - "&a%killer% &7eliminated &c%victim%"
      - "&a%killer% &7sent &c%victim% &7back to spawn"
      - "&a%killer% &7scored a clean kill on &c%victim%"
    special-permissions:
      warbridge.broadcast.legend:
        - "&6[Legend] &e%killer% &7shut down &c%victim%"
      warbridge.broadcast.mvp:
        - "&d[MVP] &f%killer% &7outplayed &c%victim%"
  goal:
    default:
      - "&a%player% &7rushed into %portal_team% &7portal. %scoring_team% &7scores 1 point!"
      - "&a%player% &7breaks through and scores for %scoring_team%&7!"
      - "&a%player% &7secures the portal. %scoring_team% &7now has &e%points%"
    special-permissions:
      warbridge.broadcast.legend:
        - "&6[Legend] &e%player% &7stormed straight into %portal_team% &7portal!"
      warbridge.broadcast.mvp:
        - "&d[MVP] &f%player% &7finishes a highlight score for %scoring_team%&7!"
