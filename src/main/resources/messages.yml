all-teams-empty: "&c所有队伍都已离线，本局将按平局处理。"
setup-finish-ok: "&a配置检查通过，可以退出 EDIT 并开始测试。"
setup-finish-fail: "&c配置仍不完整，请先修复以下问题。"

# Random announcement pools / 随机播报池
announcements:
  kill:
    default:
      - "&a%killer% &7击败了 &c%victim%"
      - "&a%killer% &7将 &c%victim% &7送回了重生点"
      - "&a%killer% &7成功击杀了 &c%victim%"
    # Special broadcast by permission / 特殊权限玩家专属播报
    special-permissions:
      warbridge.broadcast.legend:
        - "&6[传奇播报] &e%killer% &7强势终结了 &c%victim%"
      warbridge.broadcast.mvp:
        - "&d[MVP] &f%killer% &7华丽拿下了 &c%victim%"
  goal:
    default:
      - "&a%player% &7冲入了 %portal_team% &7传送门，%scoring_team% &7获得 1 分！"
      - "&a%player% &7完成了关键突破，%scoring_team% &7拿下 1 分！"
      - "&a%player% &7成功破门，%scoring_team% &7当前得分：&e%points%"
    special-permissions:
      warbridge.broadcast.legend:
        - "&6[传奇播报] &e%player% &7势不可挡地冲进了 %portal_team% &7传送门！"
      warbridge.broadcast.mvp:
        - "&d[MVP] &f%player% &7完成精彩得分，%scoring_team% &7气势如虹！"
