spectator-set: "&a已设置观战出生点。"
game-pos1-set: "&a已记录游戏范围 pos1。"
game-set: "&a已设置游戏范围。"
points-set: "&a已设置达标分数。"
minplayer-set: "&a已设置最小人数。"
maxplayer-set: "&a已设置最大人数。"
teamplayer-set: "&a已设置每队理想人数。"
unknown-team: "&c队伍不存在，请先 addteam。"
only-player: "&c只有玩家可以使用该命令。"
unknown-subcommand: "&c未知子命令。"
not-enough-players: "&c人数不足，已取消倒计时。"
countdown-start: "&e人数已满足，游戏将在 &c%seconds% &e秒后开始。"
countdown-full: "&6房间已满，倒计时缩短至 10 秒。"
round-prepare: "&b第 %round% 小回合准备中... &f%seconds%秒"
round-start: "&a第 %round% 小回合开始！"
own-goal: "&c你跳进了己方传送门，判定为乌龙球。"
gameover: "&6游戏结束！胜利方: %winner%"
send-fallback: "&e游戏结束，即将返回大厅服。"
now-spectator: "&7你现在处于观战模式。"
leave-to-lobby: "&e你已离开当前战桥房间，正在返回大厅。"
cannot-place: "&c该位置不能放置方块。"
bow-cooldown: "&c弓箭冷却中: &f%seconds%s"
check-header: "&e[Warbridge] &f开局检查结果:"
check-ok: "&a检查通过：当前配置满足自动开局条件。"
check-fail: "&c检查未通过：以下问题会阻止自动开局。"
team-selector-joined: "&a你已加入队伍: %team%"
team-selector-full: "&c该队伍已满，无法加入: %team%"
team-selector-already: "&e你已经在这个队伍里了。"
death-message: "&7你已死亡，将在 &c%seconds%s &7后复活。"
team-empty-warning: "&c场上仅剩 %team% 存活。若 %seconds% 秒内没有其他队伍玩家返回，游戏将结束。"
